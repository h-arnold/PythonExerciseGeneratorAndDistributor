name: tests (solutions rerun)

on:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: Optional pytest args forwarded after --variant solution for targeted maintainer reruns
        required: false
        default: ""
        type: string

jobs:
  pytest_solutions:
    name: maintainer solution rerun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync

      - name: Run targeted tests against solution notebooks
        env:
          PYTEST_ARGS: ${{ inputs.pytest_args }}
        run: |
          # Keep the explicit solution-variant contract visible: uv run python scripts/run_pytest_variant.py --variant solution
          python - <<'PY'
          import os
          import shlex
          import subprocess

          extra_args = shlex.split(os.environ.get("PYTEST_ARGS", ""))
          command = [
              "uv",
              "run",
              "python",
              "scripts/run_pytest_variant.py",
              "--variant",
              "solution",
              *extra_args,
          ]
          raise SystemExit(subprocess.run(command, check=False).returncode)
          PY
