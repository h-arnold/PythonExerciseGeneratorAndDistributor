# Sync construct template repositories
#
# On push to main: discovers all constructs and creates/updates their
#   template repositories on GitHub, then commits the auto-generated
#   docs page back to this repository.
# On pull_request: runs in dry-run mode with docs as an artifact for review.
# On workflow_dispatch: runs the full publish workflow (same as push to main).

name: sync template repos

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_FOR_TEMPLATE_REPOS }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync

      - name: Configure git for docs commit
        if: github.event_name != 'pull_request'
        run: |
          gh auth setup-git
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_TEMPLATE_REPOS }}

      - name: Run sync script (dry-run on PR, publish on push/dispatch)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run python scripts/sync_construct_template_repos.py \
              --dry-run \
              --verbose \
              --docs-output-path docs/teachers/construct-template-repos.md
          else
            uv run python scripts/sync_construct_template_repos.py \
              --verbose \
              --docs-output-path docs/teachers/construct-template-repos.md
          fi

      - name: Upload docs page as artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: construct-template-repos-docs
          path: docs/teachers/construct-template-repos.md

      - name: Commit and push docs page (push/dispatch only)
        if: github.event_name != 'pull_request'
        run: |
          git add docs/teachers/construct-template-repos.md
          git diff --staged --quiet || \
            (git commit -m "docs: update construct template repos [skip ci]" && \
             git push)
