[pytest]
# Keep this file so pytest works even if tools ignore pyproject settings.
# Config is duplicated intentionally for robustness in classroom environments.
# --import-mode=importlib avoids module-name collisions between the top-level
# tests/ package and the tests/ subdirectories inside each exercise directory.
addopts = -q --import-mode=importlib
testpaths = tests exercises
pythonpath = .
markers =
    task(taskno): marks the exercise task number
